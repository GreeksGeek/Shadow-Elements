<!DOCTYPE html>
<html>
<head>
  <title>Elemental Shadows v6</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }

    #menu {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      display: none;
    }

    #dialogue {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>Elemental Shadows</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="ui">
  HP: <span id="hp">100</span><br>
  Gold: <span id="gold">50</span><br>
  Skill: <span id="skill">None</span><br>
  Region: <span id="region">Forest</span><br>
  Quest: <span id="quest">Talk to Villager</span>
</div>

<div id="dialogue"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, playerData;
let enemies = [], npc, shop;
let gameStarted = false;

// Start Game
function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("ui").style.display = "block";
  init();
}

// Init
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10,20,10);
  scene.add(light);

  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshStandardMaterial({ color: 0x228B22 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Player (multi-part body)
  player = new THREE.Group();

  let body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,1.5,16),
    new THREE.MeshStandardMaterial({ color: 0x00ffff })
  );
  body.position.y = 0.75;

  let head = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,16,16),
    new THREE.MeshStandardMaterial({ color: 0xffcc99 })
  );
  head.position.y = 1.7;

  player.add(body);
  player.add(head);
  scene.add(player);

  playerData = {
    hp: 100,
    gold: 50,
    skill: "None",
    region: "Forest"
  };

  // NPC
  npc = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color: 0xffff00 })
  );
  npc.position.set(3,1,3);
  scene.add(npc);

  // Shop
  shop = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({ color: 0x0000ff })
  );
  shop.position.set(-4,1,2);
  scene.add(shop);

  createEnemies();
  animate();
}

// Enemies
function createEnemies() {
  enemies = [];
  for (let i=0;i<2;i++) {
    let e = new THREE.Mesh(
      new THREE.BoxGeometry(1,2,1),
      new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    e.position.set(10+i*3,1,i*2);
    scene.add(e);
    enemies.push({mesh:e,hp:30});
  }
}

// Controls
let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// Movement
function movePlayer() {
  if (!gameStarted) return;

  if (keys["w"]) player.position.z -= 0.15;
  if (keys["s"]) player.position.z += 0.15;
  if (keys["a"]) player.position.x -= 0.15;
  if (keys["d"]) player.position.x += 0.15;
}

// Attack
function attack() {
  enemies.forEach(e=>{
    let dist = player.position.distanceTo(e.mesh.position);
    if (dist < 2 && e.hp > 0) {
      e.hp -= 10;
      if (e.hp <= 0) {
        scene.remove(e.mesh);
        playerData.gold += 10;
      }
    }
  });
}

// Interact
function interact() {
  if (player.position.distanceTo(npc.position)<2) {
    showDialogue("Villager: Defeat enemies!");
  }
  if (player.position.distanceTo(shop.position)<2) {
    if (playerData.gold>=20) {
      playerData.gold-=20;
      playerData.skill="Fire Boost";
      showDialogue("Skill unlocked!");
    }
  }
}

// Dialogue
function showDialogue(text){
  let d=document.getElementById("dialogue");
  d.style.display="block";
  d.innerText=text;
  setTimeout(()=>d.style.display="none",3000);
}

// Region
function updateRegion(){
  if (player.position.x>50){
    scene.background.set(0xEDC9AF);
    playerData.region="Desert";
  } else if (player.position.x<-50){
    scene.background.set(0x444444);
    playerData.region="Village";
  } else {
    scene.background.set(0x87ceeb);
    playerData.region="Forest";
  }
}

// UI
function updateUI(){
  document.getElementById("hp").innerText=playerData.hp;
  document.getElementById("gold").innerText=playerData.gold;
  document.getElementById("skill").innerText=playerData.skill;
  document.getElementById("region").innerText=playerData.region;
}

// Inputs
document.addEventListener("keypress", e=>{
  if (e.key===" ") attack();
  if (e.key==="e") interact();
});

// Camera
function updateCamera(){
  camera.position.x=player.position.x;
  camera.position.z=player.position.z+12;
  camera.position.y=8;
  camera.lookAt(player.position);
}

// Loop
function animate(){
  requestAnimationFrame(animate);

  gameStarted = true;

  movePlayer();
  updateRegion();
  updateUI();
  updateCamera();

  renderer.render(scene,camera);
}
</script>

</body>
</html>
